name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yaml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yaml'

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: frontend

jobs:
  build_and_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Check build output
        run: ls -la dist/

      - name: Check for Playwright tests
        id: check-tests
        run: |
          if [ -d "tests" ] && find tests -name '*.spec.ts' -o -name '*.spec.js' | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check-tests.outputs.has_tests == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build backend containers
        if: steps.check-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: docker compose build

      - name: Start backend services
        if: steps.check-tests.outputs.has_tests == 'true'
        working-directory: backend
        run: |
          docker compose up -d
          echo "Waiting for backend to become ready..."
          curl --fail --silent --show-error \
            --retry 15 \
            --retry-all-errors \
            --retry-max-time 60 \
            http://localhost:8000/openapi.json > /dev/null \
            || { echo "Backend failed to become ready"; docker compose ps; docker compose logs; exit 1; }

      - name: Install Playwright
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: steps.check-tests.outputs.has_tests == 'true'
        env:
          VITE_API_URL: http://localhost:8000
        run: npx playwright test

      - name: Stop backend services
        if: steps.check-tests.outputs.has_tests == 'true' && always()
        working-directory: backend
        run: docker compose down

      - name: Upload Playwright report
        if: steps.check-tests.outputs.has_tests == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
