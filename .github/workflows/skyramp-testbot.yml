# Skyramp Test Bot workflow (uses develop branch)
name: Skyramp Testbot (Early Access)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # Common source directories
      - 'src/**'
      - 'app/**'
      - 'lib/**'
      - 'api/**'
      - 'server/**'
      - 'backend/**'
      - 'frontend/**'
      - 'web/**'
      - 'core/**'
      # Monorepo patterns
      - 'packages/**'
      - 'apps/**'
      - 'services/**'
      # Go conventions
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      # Rust workspaces
      - 'crates/**'
      # Serverless
      - 'functions/**'
      # Frontend framework conventions
      - 'pages/**'
      - 'components/**'
      # Ruby/Rails
      - 'db/**'
      - 'config/**'
      # Common web patterns
      - 'routes/**'
      - 'controllers/**'
      - 'models/**'
      - 'views/**'
      - 'handlers/**'
      - 'middleware/**'
      # Tests
      - 'tests/**'
      - 'test/**'
      - 'spec/**'
      # Build and dependency files
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'setup.py'
      - 'setup.cfg'
      - 'requirements*.txt'
      - 'Pipfile'
      - 'poetry.lock'
      - 'go.mod'
      - 'go.sum'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'Gemfile'
      - 'Gemfile.lock'
      - '*.csproj'
      - '*.sln'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.yaml'
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SKYRAMP_TEST_TOKEN: ${{ secrets.SKYRAMP_TEST_TOKEN }}

jobs:
  skyramp-testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Validate PAT token
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$PAT_TOKEN" ]; then
            echo "::error::PAT_TOKEN secret is not configured."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Run Skyramp Testbot
        id: testbot
        uses: skyramp/testbot@v0.5.4
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}

          skyramp_mcp_version: '0.0.63-rc.6'

      - name: Check execution status
        run: |
          echo "Tests modified: ${{ steps.testbot.outputs.tests_modified }}"
          echo "Tests created: ${{ steps.testbot.outputs.tests_created }}"
          echo "Tests executed: ${{ steps.testbot.outputs.tests_executed }}"
