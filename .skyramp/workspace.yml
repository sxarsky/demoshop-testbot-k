# Skyramp Workspace Configuration
workspace:
  repoName: sxarsky/demoshop-testbot
  repoUrl: https://github.com/sxarsky/demoshop-testbot.git
metadata:
  schemaVersion: v1
  mcpVersion: next
  executorVersion: v1.3.16
  createdAt: "2026-03-26T17:04:46.039Z"
  updatedAt: "2026-03-26T17:04:46.044Z"
services:
  - serviceName: backend
    language: python
    framework: pytest
    testDirectory: backend/tests
    api:
      schemaPath:  http://localhost:8000/openapi.json
      authType: bearer
      authHeader: Authorization
      baseUrl: http://localhost:8000
    runtimeDetails:
      serverStartCommand: docker compose up -d backend
      runtime: docker
      dockerNetwork: demoshop-fullstack_demoshop-network
  - serviceName: frontend
    language: typescript
    framework: playwright
    testDirectory: frontend/tests
    api:
      baseUrl: http://localhost:5173
    runtimeDetails:
      serverStartCommand: docker compose up -d frontend
      runtime: docker
      dockerNetwork: demoshop-fullstack_demoshop-network