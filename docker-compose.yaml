services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
  init-data:
    build:
      context: ./init_data
    environment:
      - SKYRAMP_ENVIRONMENT=local
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: ["python3", "/init_data/load_data.py"]
    depends_on:
      - redis
  api-insight:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-insight:v1.0
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - 8000:8000
    depends_on:
      - init-data
